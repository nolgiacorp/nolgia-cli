name: Release

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test, Lint & Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: stable
          components: rustfmt, clippy
          cache: true

      - name: Install libdbus (keyring crate dependency)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Run tests
        # The e2e feature gates live-API tests (real generations, needs a token); compile-check it via clippy instead.
        run: cargo test --workspace --locked

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Check formatting
        run: cargo fmt --all -- --check

  build-release:
    name: Build ${{ matrix.archive }}
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            targets: x86_64-unknown-linux-gnu
            binary: nolgia
            output_ext: ''
            archive: nolgia-x86_64-unknown-linux-gnu
            universal: false
          - os: macos-latest
            targets: x86_64-apple-darwin aarch64-apple-darwin
            binary: nolgia
            output_ext: ''
            archive: nolgia-x86_64-apple-darwin
            universal: true
          - os: windows-latest
            targets: x86_64-pc-windows-msvc
            binary: nolgia
            output_ext: '.exe'
            archive: nolgia-x86_64-pc-windows-msvc
            universal: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain with cross-compile targets
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: stable
          targets: ${{ matrix.targets }}
          cache: true

      - name: Install libdbus (keyring crate dependency)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Build release binary
        shell: bash
        run: |
          set -euxo pipefail
          for target in ${{ matrix.targets }}; do
            rustup target add "$target"
            cargo build --release --target "$target" --bin ${{ matrix.binary }} --locked
          done

      - name: Create universal macOS binary
        if: matrix.universal
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p target/universal-release
          lipo -create \
            -output target/universal-release/${{ matrix.binary }} \
            target/x86_64-apple-darwin/release/${{ matrix.binary }} \
            target/aarch64-apple-darwin/release/${{ matrix.binary }}

      - name: Strip and rename binary
        shell: bash
        run: |
          set -euxo pipefail
          BINARY="${{ matrix.binary }}${{ matrix.output_ext }}"
          ARCHIVE="${{ matrix.archive }}${{ matrix.output_ext }}"

          if [ "${{ matrix.universal }}" = "true" ]; then
            SRC="target/universal-release/${BINARY}"
          else
            TARGET=$(echo "${{ matrix.targets }}" | awk '{print $1}')
            SRC="target/${TARGET}/release/${BINARY}"
          fi

          case "${{ runner.os }}" in
            Linux)
              strip "${SRC}"
              ;;
            macOS)
              strip -x "${SRC}"
              ;;
          esac

          mv "${SRC}" "${ARCHIVE}"
          file "${ARCHIVE}"
          ls -la "${ARCHIVE}"

      - name: Upload binary as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}${{ matrix.output_ext }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create GitHub Release
    needs: [test, build-release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Show downloaded artifacts
        run: |
          echo "== artifacts tree =="
          find artifacts -maxdepth 3 -print
          echo "== file types =="
          for f in $(find artifacts -type f); do
            printf '%-12s %s\n' "$(file -b "${f}")" "${f}"
          done

      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          awk -v tag="${{ github.ref_name }}" '
            $0 == "## " tag {found=1; next}
            /^## / {found=0}
            found {print}
          ' CHANGELOG.md | sed -e '/./,$!d' > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "See CHANGELOG.md for details." > release-notes.md
          fi
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          fail_on_unmatched_files: true
          files: |
            artifacts/nolgia-x86_64-unknown-linux-gnu/nolgia-x86_64-unknown-linux-gnu
            artifacts/nolgia-x86_64-apple-darwin/nolgia-x86_64-apple-darwin
            artifacts/nolgia-x86_64-pc-windows-msvc/nolgia-x86_64-pc-windows-msvc.exe

  publish-crates:
    name: Publish to crates.io
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # OIDC for crates.io Trusted Publishing. Both nolgia-client and
      # nolgia-cli must have a trusted publisher linked on crates.io
      # (owner nolgiainc, repo nolgia-cli, workflow release.yml); the minted
      # token is scoped to exactly those crates.
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: stable
          cache: true

      - name: Install libdbus (keyring crate dependency)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Authenticate to crates.io via OIDC
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          # cargo waits for the client to land in the index before the cli publish
          # resolves it. Already-published versions are skipped so a partial
          # release (e.g. a crates.io name cooldown) can be re-run safely.
          for crate in nolgia-client nolgia-cli; do
            if out=$(cargo publish -p "$crate" --locked 2>&1); then
              echo "$out"
            elif echo "$out" | grep -qi "already uploaded\|already exists"; then
              echo "$crate version already on crates.io; skipping"
            else
              echo "$out" >&2
              exit 1
            fi
          done

  publish-npm:
    name: Publish to npm
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # OIDC for npm Trusted Publishing: @nolgia/cli has a trusted publisher
      # linked on npmjs.com (this repo + release.yml), so publishes are
      # tokenless — GitHub mints a short-lived id-token npm verifies. No
      # NPM_TOKEN secret exists.
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Verify package version matches the tag
        run: |
          set -euo pipefail
          PKG_VERSION=$(node -p "require('./npm/package.json').version")
          TAG="${{ github.ref_name }}"
          if [ "v${PKG_VERSION}" != "${TAG}" ]; then
            echo "npm/package.json version v${PKG_VERSION} does not match tag ${TAG}" >&2
            exit 1
          fi

      - name: Publish @nolgia/cli
        working-directory: npm
        run: |
          set -euo pipefail
          # Tokenless publish via npm Trusted Publishing (OIDC). Needs the
          # trusted publisher linked on npmjs.com and id-token: write above;
          # npm >= 11.5.1 detects the OIDC environment automatically and also
          # attaches build provenance. No NODE_AUTH_TOKEN is set, so the
          # empty-token .npmrc line that setup-node writes cannot shadow OIDC.
          npm publish --access public --ignore-scripts
